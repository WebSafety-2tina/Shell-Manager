{% extends "base.html" %}

{% block title %}主机管理 - Shell Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title"><span class="icon icon-hosts" aria-hidden="true"></span> 主机管理</h1>
    <p class="page-subtitle">已建立连接的Shell会话列表</p>
</div>

<div class="toolbar">
    <button type="button" class="btn btn-secondary" onclick="refreshSessions()" aria-label="刷新会话列表">
        <span class="icon icon-refresh" aria-hidden="true"></span>
        刷新
    </button>
</div>

<div class="hosts-container">
    <div class="hosts-table-wrapper">
        <table class="hosts-table">
            <thead>
                <tr>
                    <th>状态</th>
                    <th>会话ID</th>
                    <th>IP地址</th>
                    <th>端口</th>
                    <th>操作系统</th>
                    <th>用户</th>
                    <th>位置</th>
                    <th>CPU/内存</th>
                    <th>连接时间</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="hostsList">
                <tr class="empty-row">
                    <td colspan="10">
                        <div class="empty-state">
                            <div class="empty-icon"><span class="icon icon-empty"></span></div>
                            <div class="empty-text">暂无已连接的主机</div>
                            <div class="empty-hint">启动监听器等待目标连接</div>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<style>
.hosts-container {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    border: 1px solid var(--border-color);
    overflow: hidden;
}

.hosts-table-wrapper {
    overflow-x: auto;
}

.hosts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

.hosts-table th {
    background: var(--bg-tertiary);
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border-color);
    white-space: nowrap;
}

.hosts-table td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border-subtle);
    vertical-align: middle;
}

.hosts-table tbody tr {
    transition: background 0.2s;
}

.hosts-table tbody tr:hover {
    background: var(--bg-hover);
}

.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
}

.status-online {
    background: rgba(34, 197, 94, 0.15);
    color: #22c55e;
}

.status-offline {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444;
}

.session-id {
    font-family: 'Monaco', monospace;
    font-size: 12px;
    color: var(--color-primary);
    font-weight: 500;
}

.ip-address {
    font-family: 'Monaco', monospace;
    font-weight: 500;
}

.ip-connect-hint {
    font-size: 11px;
    color: var(--text-tertiary);
    font-family: 'Monaco', monospace;
    margin-top: 2px;
}

.os-info {
    display: flex;
    align-items: center;
    gap: 6px;
}

.os-icon {
    font-size: 16px;
}

.location-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-secondary);
}

.action-buttons {
    display: flex;
    gap: 6px;
}

.btn-xs {
    padding: 6px 10px;
    font-size: 11px;
    border-radius: var(--radius-sm);
}

.empty-row td {
    padding: 60px 20px;
}

.empty-state {
    text-align: center;
    color: var(--text-tertiary);
}

.empty-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
}

.empty-text {
    font-size: 16px;
    margin-bottom: 4px;
}

.empty-hint {
    font-size: 13px;
    opacity: 0.7;
}

.toolbar {
    margin-bottom: 20px;
    display: flex;
    gap: 10px;
}
</style>

<script>
let sessions = [];

// 初始化（复用 app.js 的全局 socket，禁止再声明 let socket，否则会 SyntaxError 导致本页脚本整段不执行）
document.addEventListener('DOMContentLoaded', () => {
    loadSessions();
});
document.addEventListener('new_session', () => loadSessions());
document.addEventListener('session_disconnected', () => loadSessions());
document.addEventListener('session_info', () => loadSessions());
document.addEventListener('session_deleted', () => loadSessions());

// 加载会话列表
async function loadSessions() {
    try {
        const res = await fetch('/api/sessions');
        if (redirectIfUnauthorized(res)) return;
        const data = await res.json();
        if (data.success) {
            sessions = data.sessions;
            renderHosts();
        }
    } catch (e) {
        console.error('加载会话失败:', e);
    }
}

/** 丢弃仍混在字段里的 shell 指令回显（旧会话脏数据） */
function sanitizeInfoField(v) {
    let t = cleanAnsi(String(v ?? '')).trim();
    if (!t) return '';
    if (/;\s*(uname|nproc|getconf|free|cat\s+\/etc|awk|grep\s+PRETTY|printf|echo\s+__)/i.test(t)) return '';
    if (/\/proc\/(meminfo|cpuinfo|uptime)/.test(t) && (/;\s/.test(t) || /\|\|/.test(t))) return '';
    if (t.length > 120 && /;\s/.test(t)) return '';
    return t;
}

// 渲染主机列表
function renderHosts() {
    const tbody = document.getElementById('hostsList');
    
    if (sessions.length === 0) {
        tbody.innerHTML = `
            <tr class="empty-row">
                <td colspan="10">
                    <div class="empty-state">
                        <div class="empty-icon"><span class="icon icon-empty"></span></div>
                        <div class="empty-text">暂无已连接的主机</div>
                        <div class="empty-hint">启动监听器等待目标连接</div>
                    </div>
                </td>
            </tr>
        `;
        return;
    }
    
    tbody.innerHTML = sessions.map(s => {
        const isOnline = s.is_alive;
        const info = s.system_info || {};
        const osLabelRaw = sanitizeInfoField(info.os_type || info.os || '');
        const osVerRaw = sanitizeInfoField(info.os_version || '');
        const osIconClass = getOsIconClass(osLabelRaw);
        const locationRaw = sanitizeInfoField(info.location) || '未知';
        const countryRaw = sanitizeInfoField(info.country || '');
        const coresRaw = sanitizeInfoField(info.cpu_cores || '');
        const cpuInfoRaw = sanitizeInfoField(info.cpu_info || '');
        const memUsedRaw = sanitizeInfoField(info.memory_used || '');
        const memRaw = sanitizeInfoField(info.memory_total || '');
        const userRaw = sanitizeInfoField(info.user || '');
        const publicIpRaw = sanitizeInfoField(info.public_ip || '');
        const connectHost = (s.host || '').trim();
        const ipPrimary = publicIpRaw || connectHost || '-';
        const showLanHint = publicIpRaw && connectHost && publicIpRaw !== connectHost;
        let cpuMem = '-';
        if (coresRaw || cpuInfoRaw || memUsedRaw || memRaw) {
            const c = coresRaw
                ? escapeHtml(coresRaw) + '核'
                : (cpuInfoRaw ? escapeHtml(cpuInfoRaw) : '-');
            const m = [memUsedRaw, memRaw].filter(Boolean).map(x => escapeHtml(x)).join(' / ');
            cpuMem = `${c} / ${m || '-'}`;
        }
        
        return `
            <tr data-session="${s.id}">
                <td>
                    <span class="status-badge ${isOnline ? 'status-online' : 'status-offline'}">
                        ${isOnline ? '● 在线' : '○ 离线'}
                    </span>
                </td>
                <td>
                    <span class="session-id">${s.id}</span>
                </td>
                <td>
                    <span class="ip-address">${escapeHtml(ipPrimary)}</span>
                    ${showLanHint ? `<div class="ip-connect-hint" title="反弹连接来源地址">连 ${escapeHtml(connectHost)}</div>` : ''}
                </td>
                <td>${s.port || '-'}</td>
                <td>
                    <div class="os-info">
                        <span class="os-icon"><span class="icon ${osIconClass}" aria-hidden="true"></span></span>
                        <span>${osLabelRaw ? escapeHtml(osLabelRaw) : 'Unknown'} ${osVerRaw ? escapeHtml(osVerRaw) : ''}</span>
                    </div>
                </td>
                <td>${userRaw ? escapeHtml(userRaw) : '-'}</td>
                <td>
                    <span class="location-badge">
                        ${getLocationPrefix(countryRaw)}${escapeHtml(locationRaw)}
                    </span>
                </td>
                <td>${cpuMem}</td>
                <td>${formatTime(s.connected_at)}</td>
                <td>
                    <div class="action-buttons">
                        <button class="btn btn-primary btn-xs" onclick="openTerminal('${s.id}')" ${!isOnline ? 'disabled' : ''}>
                            终端
                        </button>
                        <button class="btn btn-secondary btn-xs" onclick="openFiles('${s.id}')" ${!isOnline ? 'disabled' : ''}>
                            文件
                        </button>
                        <button class="btn btn-warning btn-xs" onclick="disconnectSession('${s.id}')" ${!isOnline ? 'disabled' : ''}>
                            断开
                        </button>
                        <button class="btn btn-danger btn-xs" onclick="deleteSession('${s.id}')">
                            删除
                        </button>
                    </div>
                </td>
            </tr>
        `;
    }).join('');
}

// 系统类型 → 图标类名
function getOsIconClass(os) {
    if (!os) return 'icon-hosts';
    const o = os.toLowerCase();
    if (o.includes('windows')) return 'icon-window';
    if (o.includes('linux')) return 'icon-braces';
    if (o.includes('darwin') || o.includes('mac')) return 'icon-terminal';
    if (o.includes('freebsd') || o.includes('bsd')) return 'icon-package';
    return 'icon-hosts';
}

function escapeHtml(str) {
    if (str == null) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

// 位置前缀：国家/地区代码徽章或地球图标
function getLocationPrefix(country) {
    if (!country || country === '本地网络' || country === 'Unknown') {
        return '<span class="icon icon-globe" aria-hidden="true"></span> ';
    }
    return `<span class="location-chip">${escapeHtml(country)}</span> `;
}

// 格式化时间
function formatTime(timestamp) {
    if (!timestamp) return '-';
    const date = new Date(timestamp);
    const now = new Date();
    const diff = now - date;
    
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return `${Math.floor(diff/60000)}分钟前`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)}小时前`;
    return date.toLocaleDateString();
}

// 刷新会话
function refreshSessions() {
    loadSessions();
}

// 打开终端
function openTerminal(sessionId) {
    window.location.href = `/terminal/${sessionId}`;
}

// 打开文件管理
function openFiles(sessionId) {
    window.location.href = `/files/${sessionId}`;
}

// 断开会话
function disconnectSession(sessionId) {
    if (confirm('确定要断开此会话吗？')) {
        socket.emit('close_session', { session_id: sessionId });
    }
}

// 删除会话
function deleteSession(sessionId) {
    if (confirm('确定要删除此会话记录吗？')) {
        socket.emit('delete_session', { session_id: sessionId });
        setTimeout(() => loadSessions(), 500);
    }
}

</script>
{% endblock %}
