{% extends "base.html" %}

{% block title %}载荷生成器 - Shell Manager{% endblock %}

{% block active_page %}payload{% endblock %}

{% block page_title %}载荷生成器{% endblock %}

{% block content %}
<!-- 基础配置 -->
<div class="card card-region card-region--config">
    <div class="card-header">
        <div>
            <h3 class="card-title">基础配置</h3>
            <p class="card-subtitle">设置目标IP和端口</p>
        </div>
    </div>
    <div class="payload-config-grid">
        <div class="input-group">
            <label class="input-label">目标IP地址</label>
            <input type="text" class="input" id="target-host" placeholder="例如: 192.168.1.100" value="">
            <div class="payload-hint">目标机器将连接到此IP</div>
        </div>
        <div class="input-group">
            <label class="input-label">目标端口</label>
            <input type="number" class="input" id="target-port" value="4444" min="1" max="65535">
            <div class="payload-hint">监听端口</div>
        </div>
        <div class="input-group">
            <label class="input-label">编码格式</label>
            <select class="input" id="encoding">
                <option value="none">无编码</option>
                <option value="base64">Base64</option>
                <option value="url">URL编码</option>
                <option value="hex">Hex编码</option>
            </select>
        </div>
    </div>
    <div class="payload-actions-row">
        <button type="button" class="btn btn-primary" onclick="generateAllPayloads()">
            <span class="icon icon-magic" aria-hidden="true"></span> 生成所有载荷
        </button>
        <button type="button" class="btn btn-secondary" onclick="getLocalIP()">
            <span class="icon icon-globe" aria-hidden="true"></span> 获取本机IP
        </button>
    </div>
</div>

<!-- 搜索和筛选 -->
<div class="card card-region card-region--filter">
    <div class="payload-filter-toolbar">
        <div class="payload-search-wrap">
            <input type="text" class="input" id="payload-search" placeholder="搜索载荷..." oninput="filterPayloads()">
        </div>
        <div class="payload-filter-chips" role="toolbar" aria-label="载荷分类筛选">
            <button type="button" class="btn btn-ghost btn-sm filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="bash" onclick="setFilter('bash')">Bash</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="nc" onclick="setFilter('nc')">Netcat</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="python" onclick="setFilter('python')">Python</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="php" onclick="setFilter('php')">PHP</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="perl" onclick="setFilter('perl')">Perl</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="powershell" onclick="setFilter('powershell')">PowerShell</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="java" onclick="setFilter('java')">Java</button>
            <button type="button" class="btn btn-ghost btn-sm filter-btn" data-filter="other" onclick="setFilter('other')">其他</button>
        </div>
    </div>
</div>

<!-- 载荷列表容器 -->
<div id="payloads-container">
    <!-- 动态生成载荷 -->
</div>

<!-- 批量操作 -->
<div class="card card-region card-region--batch">
    <div class="card-header">
        <div>
            <h3 class="card-title card-title--with-icon"><span class="icon icon-clipboard" aria-hidden="true"></span> 批量操作</h3>
            <p class="card-subtitle">导出或复制所有载荷</p>
        </div>
    </div>
    <div class="payload-batch-actions">
        <button type="button" class="btn btn-primary" onclick="copyAllPayloads()">
            <span class="icon icon-clipboard" aria-hidden="true"></span> 复制所有载荷
        </button>
        <button type="button" class="btn btn-secondary" onclick="exportPayloads()">
            <span class="icon icon-save" aria-hidden="true"></span> 导出为文件
        </button>
        <button type="button" class="btn btn-secondary" onclick="generateCheatsheet()">
            <span class="icon icon-book" aria-hidden="true"></span> 生成速查表
        </button>
    </div>
</div>
{% endblock %}

let currentFilter = 'all';

// 生成载荷
function generatePayload(template, host, port) {
    return template.replace(/{HOST}/g, host).replace(/{PORT}/g, port);
}

// 编码载荷
function encodePayload(code, encoding) {
    switch (encoding) {
        case 'base64':
            try {
                return btoa(code);
            } catch (e) {
                return 'Base64编码失败';
            }
        case 'url':
            return encodeURIComponent(code);
        case 'hex':
            return code.split('').map(c => c.charCodeAt(0).toString(16).padStart(2, '0')).join('');
        default:
            return code;
    }
}

// 渲染载荷
function renderPayloads() {
    const host = document.getElementById('target-host').value || 'YOUR_IP';
    const port = document.getElementById('target-port').value || '4444';
    const encoding = document.getElementById('encoding').value;
    const searchTerm = document.getElementById('payload-search').value.toLowerCase();
    
    const container = document.getElementById('payloads-container');
    
    // 按类别分组
    const categories = {
        'bash': { name: 'Bash / Shell', iconClass: 'icon-terminal', items: [] },
        'nc': { name: 'Netcat / Ncat', iconClass: 'icon-plug', items: [] },
        'python': { name: 'Python', iconClass: 'icon-braces', items: [] },
        'php': { name: 'PHP', iconClass: 'icon-braces', items: [] },
        'perl': { name: 'Perl', iconClass: 'icon-braces', items: [] },
        'powershell': { name: 'PowerShell', iconClass: 'icon-window', items: [] },
        'java': { name: 'Java', iconClass: 'icon-archive', items: [] },
        'other': { name: '其他语言', iconClass: 'icon-package', items: [] }
    };
    
    payloads.forEach(p => {
        // 应用过滤
        if (currentFilter !== 'all' && p.category !== currentFilter) return;
        if (searchTerm && !p.name.toLowerCase().includes(searchTerm) && !p.desc.toLowerCase().includes(searchTerm)) return;
        
        const generatedCode = generatePayload(p.code, host, port);
        const displayCode = encodePayload(generatedCode, encoding);
        
        if (categories[p.category]) {
            categories[p.category].items.push({ ...p, code: displayCode, originalCode: generatedCode });
        }
    });
    
    let html = '';
    for (const [key, cat] of Object.entries(categories)) {
        if (cat.items.length === 0) continue;
        
        html += `
            <div class="payload-region payload-region--${key}" data-category="${key}">
                <div class="payload-section">
                <div class="payload-section-title"><span class="icon ${cat.iconClass}" aria-hidden="true"></span><span>${cat.name}</span></div>
                <div class="payload-grid">
                    ${cat.items.map(p => `
                        <div class="payload-card" data-id="${p.id}" data-category="${key}">
                            <div class="payload-card-header">
                                <div>
                                    <div class="payload-card-title">${escapeHtml(p.name)}</div>
                                    <div class="payload-card-desc">${escapeHtml(p.desc)}</div>
                                </div>
                                <div class="payload-card-actions">
                                    <button type="button" class="btn btn-ghost btn-sm" onclick="copyPayload('${escapeHtml(p.originalCode)}')" title="复制" aria-label="复制载荷"><span class="icon icon-clipboard" aria-hidden="true"></span></button>
                                </div>
                            </div>
                            <div class="payload-card-body">
                                <div class="payload-code">${escapeHtml(p.code)}</div>
                                <div class="payload-tags">
                                    <span class="payload-tag">${key.toUpperCase()}</span>
                                    ${encoding !== 'none' ? `<span class="payload-tag">${encoding.toUpperCase()}</span>` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                </div>
            </div>
        `;
    }
    
    container.innerHTML = html || '<div class="empty-state"><div class="empty-state-icon"><span class="icon icon-search"></span></div><div class="empty-state-title">未找到匹配的载荷</div></div>';
}

// 复制载荷
function copyPayload(code) {
    copyToClipboard(code);
}

// 生成所有载荷
function generateAllPayloads() {
    renderPayloads();
    showToast('载荷已生成', 'success');
}

// 获取本机IP
async function getLocalIP() {
    try {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        
        pc.onicecandidate = (event) => {
            if (event.candidate) {
                const match = event.candidate.candidate.match(/(\d+\.\d+\.\d+\.\d+)/);
                if (match) {
                    document.getElementById('target-host').value = match[1];
                    pc.close();
                    showToast(`已获取本机IP: ${match[1]}`, 'success');
                }
            }
        };
    } catch (e) {
        showToast('获取IP失败，请手动输入', 'error');
    }
}

// 过滤载荷
function filterPayloads() {
    renderPayloads();
}

// 设置过滤器
function setFilter(filter) {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
    });
    renderPayloads();
}

// 复制所有载荷
function copyAllPayloads() {
    const host = document.getElementById('target-host').value || 'YOUR_IP';
    const port = document.getElementById('target-port').value || '4444';
    
    let allPayloads = '';
    payloads.forEach(p => {
        allPayloads += `# ${p.name}\n${generatePayload(p.code, host, port)}\n\n`;
    });
    
    copyToClipboard(allPayloads);
}

// 导出载荷
function exportPayloads() {
    const host = document.getElementById('target-host').value || 'YOUR_IP';
    const port = document.getElementById('target-port').value || '4444';
    
    let content = `# 反弹Shell载荷速查表\n# 目标: ${host}:${port}\n# 生成时间: ${new Date().toLocaleString()}\n\n`;
    
    const categories = {};
    payloads.forEach(p => {
        if (!categories[p.category]) categories[p.category] = [];
        categories[p.category].push(p);
    });
    
    for (const [cat, items] of Object.entries(categories)) {
        content += `\n# ============ ${cat.toUpperCase()} ============\n\n`;
        items.forEach(p => {
            content += `# ${p.name} - ${p.desc}\n${generatePayload(p.code, host, port)}\n\n`;
        });
    }
    
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reverse-shells-${host}-${port}.txt`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('载荷已导出', 'success');
}

// 生成速查表
function generateCheatsheet() {
    const host = document.getElementById('target-host').value || 'YOUR_IP';
    const port = document.getElementById('target-port').value || '4444';
    
    let markdown = `# 反弹Shell速查表\n\n目标: \`${host}:${port}\`\n\n`;
    
    const categories = {
        'bash': 'Bash / Shell',
        'nc': 'Netcat',
        'python': 'Python',
        'php': 'PHP',
        'perl': 'Perl',
        'powershell': 'PowerShell',
        'java': 'Java',
        'other': '其他'
    };
    
    for (const [key, name] of Object.entries(categories)) {
        const items = payloads.filter(p => p.category === key);
        if (items.length === 0) continue;
        
        markdown += `\n## ${name}\n\n`;
        items.forEach(p => {
            markdown += `### ${p.name}\n\n${p.desc}\n\n\`\`\`bash\n${generatePayload(p.code, host, port)}\n\`\`\`\n\n`;
        });
    }
    
    const blob = new Blob([markdown], { type: 'text/markdown' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reverse-shell-cheatsheet.md`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('速查表已生成', 'success');
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
    renderPayloads();
    
    // 监听输入变化
    document.getElementById('target-host').addEventListener('input', renderPayloads);
    document.getElementById('target-port').addEventListener('input', renderPayloads);
    document.getElementById('encoding').addEventListener('change', renderPayloads);
});
</script>
