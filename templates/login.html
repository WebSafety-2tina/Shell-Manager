{% extends "login_base.html" %}

{% block title %}登录 - Shell Manager{% endblock %}

{% block extra_css %}
<style>
.login-only-body {
    margin: 0;
    min-height: 100vh;
}
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <div class="login-logo" aria-hidden="true"><span class="icon icon-terminal"></span></div>
            <h1 class="login-title">Shell Manager</h1>
            <p class="login-subtitle">Shell Manager</p>
        </div>
        
        <form method="POST" action="/login" class="login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            {% if request.args.get('next') %}
            <input type="hidden" name="next" value="{{ request.args.get('next') }}">
            {% endif %}
            
            {% if error %}
            <div class="login-error" role="alert">
                <span class="icon icon-alert" aria-hidden="true"></span>
                <span>{{ error }}</span>
            </div>
            {% endif %}
            
            <div class="input-group">
                <label class="input-label">用户名</label>
                <input type="text" name="username" class="input" placeholder="请输入用户名" required autofocus>
            </div>
            
            <div class="input-group">
                <label class="input-label">密码</label>
                <input type="password" name="password" class="input" placeholder="请输入密码" required>
            </div>
            
            <div class="login-options">
                <label class="login-remember">
                    <input type="checkbox" name="remember">
                    <span>记住登录</span>
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                登 录
            </button>
        </form>
        
        <div class="login-footer">
            <p>默认账号: admin / admin123456</p>
        </div>
    </div>
</div>

<style>
.login-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg-deep) 0%, var(--bg-base) 100%);
    padding: 20px;
}

.login-box {
    width: 100%;
    max-width: 400px;
    background: var(--bg-base);
    border-radius: var(--border-radius);
    padding: 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    border: 1px solid var(--border-default);
}

.login-header {
    text-align: center;
    margin-bottom: 32px;
}

.login-logo {
    font-size: 48px;
    margin-bottom: 16px;
}

.login-title {
    font-size: 24px;
    font-weight: 700;
    color: var(--text-primary);
    margin: 0 0 8px 0;
}

.login-subtitle {
    font-size: 14px;
    color: var(--text-tertiary);
    margin: 0;
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.login-error {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--color-danger);
    padding: 12px 16px;
    border-radius: var(--border-radius-sm);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.login-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.login-remember {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 13px;
}

.login-remember input {
    width: 16px;
    height: 16px;
}

.btn-block {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
}

.login-footer {
    margin-top: 24px;
    text-align: center;
    padding-top: 20px;
    border-top: 1px solid var(--border-subtle);
}

.login-footer p {
    color: var(--text-quaternary);
    font-size: 12px;
    margin: 0;
}
</style>
{% endblock %}
